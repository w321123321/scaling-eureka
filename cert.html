<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>特种设备公示信息查询系统</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #ffffff;
            font-size: 14px;
        }
        /* 顶部黑色标题栏 */
        .header {
            background-color: #333333;
            color: #ffffff;
            text-align: center;
            padding: 18px 0;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        /* 蓝色子标题 */
        .sub-title {
            color: #336699;
            text-align: center;
            padding: 15px 0;
            font-size: 16px;
            background-color: #ffffff;
            margin-bottom: 5px;
        }
        /* 核心信息表格 */
        .info-table {
            width: 96%;
            margin: 0 auto;
            border-collapse: collapse;
            background-color: #f0f5ff;
            border: 1px solid #cce0ff;
        }
        .info-table td {
            border: 1px solid #cce0ff;
            padding: 10px 8px;
            color: #333333;
            line-height: 1.5;
        }
        /* 表格列宽分配，和截图一致 */
        .info-table td:nth-child(1) { width: 20%; font-weight: 500; }
        .info-table td:nth-child(2) { width: 30%; }
        .info-table td:nth-child(3) { width: 20%; font-weight: 500; }
        .info-table td:nth-child(4) { width: 30%; }
        /* 底部备注栏 */
        .remark {
            width: 96%;
            margin: 10px auto 20px;
            padding: 12px 10px;
            background-color: #f0f5ff;
            border: 1px solid #cce0ff;
            color: #333333;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- 顶部标题 -->
    <div class="header">特种设备公示信息查询系统</div>
    <!-- 子标题 -->
    <div class="sub-title">特种设备从业人员公示查询结果</div>
    <!-- 核心信息表格 -->
    <table class="info-table">

            <td>证书有效期:</td>
            <td>2029-03</td>
        </tr>
        <tr>
            <td>发证部门:</td>
            <td>潍坊市市场监督管理局</td>
            <td>考试机构:</td>
            <td>潍坊市市场监督管理局</td>
        </tr>
        <tr>

</body>
</html>
